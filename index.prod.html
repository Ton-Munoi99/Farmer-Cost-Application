<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#16A34A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RiceCost">
  <title>Rice Cost Manager — คำนวณต้นทุนนาข้าว</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link href="fonts/sarabun.css" rel="stylesheet">

  <script>
  window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "green",
    "fontSize": "normal",
    "lang": "th"
  }/*EDITMODE-END*/;
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', -apple-system, sans-serif;
      background: radial-gradient(ellipse at 30% 20%, #c8ddb5 0%, #a8c494 40%, #7fa87d 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 16px 48px;
    }

    #phone-shell {
      width: 390px;
      min-height: 844px;
      background: #FAFAF7;
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 10px rgba(255,255,255,0.12),
        0 32px 80px rgba(0,0,0,0.38),
        inset 0 1px 0 rgba(255,255,255,0.7);
      display: flex;
      flex-direction: column;
    }

    #root {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 844px;
      position: relative;
    }

    .screen-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      background: #FAFAF7;
    }
    .screen-scroll::-webkit-scrollbar { display: none; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .screen-enter { animation: fadeSlideUp 0.28s cubic-bezier(0.22,1,0.36,1) both; }

    @keyframes scalePop {
      0%   { transform: scale(0.85); opacity: 0; }
      70%  { transform: scale(1.04); }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop { animation: scalePop 0.45s cubic-bezier(0.22,1,0.36,1) both; }
  </style>
</head>
<body>
  <div id="phone-shell">
    <div id="root"></div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.warn('Service worker registration failed.', err);
        });
      });
    }
  </script>
</body>
</html>
